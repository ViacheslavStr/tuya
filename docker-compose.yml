version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tuya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tuya
      POSTGRES_PASSWORD: tuya
      POSTGRES_DB: tuya
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres-data:

